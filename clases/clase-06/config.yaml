# config.yaml
# ------------------------------------------------------------------
# Configuración EXTERNA del pipeline.
# La idea: cambiar el comportamiento del programa SIN tocar el código.
# Si mañana el umbral de "caro" cambia a 150, edito aquí, no el .py.
# ------------------------------------------------------------------

entrada:
  n_pedidos: 200          # cuántos pedidos generar para la demo

reglas_negocio:
  umbral_caro: 100        # precio sobre el cual un pedido es "caro"
  ciudad_objetivo: "sao paulo"   # ciudad que nos interesa analizar

salida:
  carpeta: "salida"       # dónde guardar los resultados
  archivo_resumen: "resumen_categorias.csv"
